# Cloudflare Worker — HS Classification API for launchrocket.in
# Deploy:  cd worker && npx wrangler deploy
#
# This Worker powers the free single-SKU classifier at /hs-classification/.
# The static site itself is served by GitHub Pages; only /api/classify* is
# routed to this Worker, so the page keeps its `connect-src 'self'` CSP.

name = "lr-hs-classify"
main = "classify.js"
compatibility_date = "2025-01-01"

# ---------------------------------------------------------------------------
# Route the API on the production domain (requires the zone to be on Cloudflare).
# Everything else on the domain continues to be served by GitHub Pages.
# ---------------------------------------------------------------------------
# [[routes]]
# pattern = "www.launchrocket.in/api/classify*"
# zone_name = "launchrocket.in"
#
# [[routes]]
# pattern = "launchrocket.in/api/classify*"
# zone_name = "launchrocket.in"

# ---------------------------------------------------------------------------
# Non-secret variables
# ---------------------------------------------------------------------------
[vars]
# Current Sonnet-class model. Override here if you pin a dated snapshot.
ANTHROPIC_MODEL = "claude-sonnet-5"

# ---------------------------------------------------------------------------
# KV namespace for anonymised per-IP daily rate limiting (~5/day).
# Create it first:  npx wrangler kv namespace create RATE_LIMIT_KV
# then paste the returned id below and uncomment.
# ---------------------------------------------------------------------------
# [[kv_namespaces]]
# binding = "RATE_LIMIT_KV"
# id = "<your-kv-namespace-id>"

# ---------------------------------------------------------------------------
# Secrets (DO NOT put these in this file). Set them with wrangler:
#   npx wrangler secret put ANTHROPIC_API_KEY
#   npx wrangler secret put TURNSTILE_SECRET   # optional, enables Turnstile
# ---------------------------------------------------------------------------
